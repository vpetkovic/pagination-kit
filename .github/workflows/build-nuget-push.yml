name: Build and Push NuGet Packages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore PaginationKit.slnx

      - name: Build PaginationKit
        run: dotnet build src/PaginationKit/PaginationKit.csproj --configuration Release --output "${{ github.workspace }}/packages" --no-restore

      - name: Build PaginationKit.AspNetCore
        run: dotnet build src/PaginationKit.AspNetCore/PaginationKit.AspNetCore.csproj --configuration Release --output "${{ github.workspace }}/packages" --no-restore

      - name: Build PaginationKit.FastEndpoints
        run: dotnet build src/PaginationKit.FastEndpoints/PaginationKit.FastEndpoints.csproj --configuration Release --output "${{ github.workspace }}/packages" --no-restore

      - name: Run tests
        run: dotnet test tests/PaginationKit.Tests/PaginationKit.Tests.csproj --no-restore

      - name: Push NuGet packages
        run: dotnet nuget push "${{ github.workspace }}/packages/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
