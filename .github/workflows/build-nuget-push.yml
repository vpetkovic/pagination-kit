name: Build and Push NuGet Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.1). Overrides tag-based version.'
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            7.0.x
            8.0.x
            10.0.x

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Restore dependencies
        run: dotnet restore PaginationKit.slnx

      - name: Run tests
        run: dotnet test tests/PaginationKit.Tests/PaginationKit.Tests.csproj --no-restore

      - name: Pack NuGet packages
        run: |
          dotnet pack src/PaginationKit/PaginationKit.csproj --configuration Release --output packages /p:Version=${{ steps.version.outputs.VERSION }}
          dotnet pack src/PaginationKit.AspNetCore/PaginationKit.AspNetCore.csproj --configuration Release --output packages /p:Version=${{ steps.version.outputs.VERSION }}
          dotnet pack src/PaginationKit.FastEndpoints/PaginationKit.FastEndpoints.csproj --configuration Release --output packages /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Push NuGet packages
        run: dotnet nuget push "packages/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
